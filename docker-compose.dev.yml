services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-abhishek0003}
      POSTGRES_DB: ${POSTGRES_DB:-pushable_ai}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:abhishek0003@postgres:5432/pushable_ai}
      JWT_SECRET: ${JWT_SECRET:-pushable-ai-super-secret-jwt-key-32chars}
      PORT: '4000'
      OPENROUTER_KEY: ${OPENROUTER_KEY}
      REDIS_URL: redis://redis:6379
      COMPOSIO_API_KEY: ${COMPOSIO_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://192.168.1.35:3000}
      BROWSER_SERVICE_URL: http://browser-service:8080
      BRIDGE_API_KEY: ''
      EXTENSION_BRIDGE_URL: ws://extension-bridge:3001
      CDP_ANALYZER_URL: ${CDP_ANALYZER_URL:-http://cdp-analyzer:5050}
      DEFAULT_BROWSER_AGENT_MODEL: ${DEFAULT_BROWSER_AGENT_MODEL:-google/gemini-2.5-flash}
      EXTENSION_BRIDGE_PUBLIC_URL: ${EXTENSION_BRIDGE_PUBLIC_URL:-ws://localhost:3004}
      BW_DEVICE_ID: 'b661b739-3e2c-4517-9ec0-63cb10842b84'
      BW_DATA_ROOT: /data/bw-sessions
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_CLI_PROXY_URL: ${CLAUDE_CLI_PROXY_URL:-}
      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # SMTP (Email)
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Telegram Platform Bot (shared bot for all workspaces)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      # Slack Platform Bot
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID:-}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      BASE_URL: ${BASE_URL:-}
      # WhatsApp Business API
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-pushable_whatsapp_verify}
      # MinIO / S3 bucket storage
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-pushable-bucket}
      S3_REGION: ${S3_REGION:-us-east-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - bw-data:/data/bw-sessions

  browser-service:
    build:
      context: .
      dockerfile: browser-service/Dockerfile
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      PORT: '8080'
      PROFILES_DIR: /app/profiles
      ALLOWED_ORIGINS: ${FRONTEND_URL:-http://192.168.1.35:3000}
      SCREENSHOT_INTERVAL_MS: '200'
      SCREENSHOT_QUALITY: '60'
      SCREENSHOT_WIDTH: '1920'
      SCREENSHOT_HEIGHT: '1080'
      CAPSOLVER_API_KEY: ${CAPSOLVER_API_KEY}
      CAPSOLVER_EXTENSION_ENABLED: 'true'
    volumes:
      - ./browser-service/profiles:/app/profiles
      - ./browser-service/src:/app/src
      - ./browser-service/extensions:/app/extensions

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://192.168.1.35:4000}
      NEXT_PUBLIC_BROWSER_WS_URL: ${NEXT_PUBLIC_BROWSER_WS_URL:-ws://192.168.1.35:8080}
      NEXT_PUBLIC_LOGGING: ${NEXT_PUBLIC_LOGGING:-false}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

  extension-bridge:
    build: ./extension-bridge
    restart: unless-stopped
    ports:
      - '3004:3001'
    environment:
      BRIDGE_PORT: '3001'
      BRIDGE_API_KEY: ''
      BACKEND_URL: http://backend:4000
    depends_on:
      - backend
    volumes:
      - ./extension-bridge/src:/app/src

  public-frontend:
    build: ./public-frontend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      API_URL: http://backend:4000
    depends_on:
      - backend
    volumes:
      - ./public-frontend/src:/app/src
      - ./public-frontend/next.config.ts:/app/next.config.ts

  cdp-analyzer:
    build: ./cdp-analyzer
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '5050:5050'
    volumes:
      - ./cdp-analyzer:/app

  admin-panel:
    build: ./admin-panel
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:abhishek0003@postgres:5432/pushable_ai}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      API_URL: http://backend:4000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./admin-panel/src:/app/src
      - //var/run/docker.sock:/var/run/docker.sock

volumes:
  pgdata:
  redisdata:
  bw-data:
  minio-data:

name: Claude Auto Bug Fix

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write # ← THIS was missing, caused the OIDC error

jobs:
  claude-fix:
    if: |
      contains(github.event.comment.body, '@claude') &&
      github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Claude Bug Fix
        uses: anthropics/claude-code-action@beta
        env:
          ANTHROPIC_THINKING_EFFORT: medium
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: '@claude' # ← replaces 'prompt'
          model: 'claude-opus-4-6' # ← replaces 'claude_args: --model'

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0c0c0f;
      color: #e0e0e0;
      width: 320px;
      padding: 16px;
    }
    h1 {
      font-size: 14px;
      margin-bottom: 12px;
      color: #06b6d4;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    h1 .version { font-size: 10px; color: #666; font-weight: normal; }
    label {
      display: block;
      font-size: 11px;
      margin-bottom: 4px;
      color: #888;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #2a2a35;
      border-radius: 6px;
      background: #14141f;
      color: #e0e0e0;
      font-size: 12px;
      outline: none;
      margin-bottom: 10px;
    }
    input:focus { border-color: #06b6d4; }
    .row { display: flex; gap: 8px; margin-top: 4px; }
    .btn {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-connect { background: #06b6d4; color: #000; }
    .btn-connect:hover { background: #22d3ee; }
    .btn-disconnect { background: #333; color: #e0e0e0; }
    .btn-disconnect:hover { background: #444; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .status-bar {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      background: #14141f;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #666;
      flex-shrink: 0;
    }
    .dot.connected { background: #34d399; animation: pulse 2s infinite; }
    .dot.connecting { background: #fbbf24; animation: blink 1s infinite; }
    .dot.error { background: #f87171; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .info {
      margin-top: 8px;
      font-size: 10px;
      color: #555;
    }
    .error-msg {
      margin-top: 8px;
      font-size: 11px;
      color: #f87171;
    }
  </style>
</head>
<body>
  <h1>Browser Agent <span class="version">v3</span></h1>

  <label for="serverUrl">Server URL</label>
  <input type="text" id="serverUrl" placeholder="wss://ws.pushable.ai">

  <label for="apiKey">API Key</label>
  <input type="password" id="apiKey" placeholder="Your workspace API key">

  <div class="row">
    <button class="btn btn-connect" id="connectBtn">Connect</button>
    <button class="btn btn-disconnect" id="disconnectBtn" disabled>Disconnect</button>
  </div>

  <div class="status-bar">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Disconnected</span>
  </div>
  <div class="info" id="tabInfo"></div>
  <div class="error-msg" id="errorMsg"></div>

  <script src="popup.js"></script>
</body>
</html>

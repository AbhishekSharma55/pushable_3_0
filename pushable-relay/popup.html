<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0c0c0f;
      --bg-secondary: #16161a;
      --bg-tertiary: #1e1e24;
      --border: rgba(255, 255, 255, 0.08);
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --accent: #06b6d4;
      --accent-hover: #22d3ee;
      --accent-glow: rgba(6, 182, 212, 0.4);
      --success: #10b981;
      --success-glow: rgba(16, 185, 129, 0.4);
      --warning: #f59e0b;
      --error: #ef4444;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      min-height: 380px;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ── Header ───────────────────────────── */
    .header {
      padding: 24px 24px 20px;
      background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
      border-bottom: 1px solid var(--border);
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .header-title-row { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent) 0%, #0891b2 100%);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px var(--accent-glow);
    }
    .logo svg { width: 22px; height: 22px; color: white; }
    .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
    .header p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

    /* ── Content ──────────────────────────── */
    .content { padding: 20px 24px 24px; }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--text-secondary); margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    input {
      width: 100%; padding: 12px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px; font-family: inherit;
      color: var(--text-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: var(--text-muted); }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    input[type="password"] {
      font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
      letter-spacing: 0.05em;
    }

    /* ── Buttons ──────────────────────────── */
    .btn-row { display: flex; gap: 12px; margin-top: 24px; }
    button {
      flex: 1; padding: 14px 20px; border: none;
      border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all 0.2s ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    button.primary {
      background: linear-gradient(135deg, var(--accent) 0%, #0891b2 100%);
      color: white;
      box-shadow: 0 4px 14px var(--accent-glow);
    }
    button.primary:hover:not(:disabled) {
      background: linear-gradient(135deg, var(--accent-hover) 0%, var(--accent) 100%);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }
    button.primary:active:not(:disabled) { transform: translateY(0); }
    button.primary:disabled {
      background: var(--bg-tertiary); color: var(--text-muted);
      cursor: not-allowed; box-shadow: none;
    }
    button.secondary {
      background: var(--bg-tertiary); color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    button.secondary:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      border-color: rgba(255, 255, 255, 0.12);
    }
    button.icon-btn {
      flex: none; padding: 6px; background: transparent; color: var(--text-secondary);
      border-radius: var(--radius-sm); box-shadow: none; width: auto; height: auto;
    }
    button.icon-btn:hover { 
      background: rgba(255, 255, 255, 0.08); color: var(--text-primary); 
    }

    /* ── Status Card ─────────────────────── */
    .status-card {
      margin-top: 24px; padding: 16px 20px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      display: flex; align-items: center; gap: 14px;
      transition: all 0.3s ease;
    }
    .status-card.connected {
      border-color: rgba(16, 185, 129, 0.3);
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
    }

    .status-indicator {
      width: 12px; height: 12px; border-radius: 50%;
      flex-shrink: 0; position: relative;
    }
    .status-indicator.disconnected {
      background: var(--text-muted);
    }
    .status-indicator.error {
      background: var(--error);
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
    }
    .status-indicator.connecting {
      background: var(--warning);
      box-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
      animation: pulse 1.5s ease-in-out infinite;
    }
    .status-indicator.connected {
      background: var(--success);
      box-shadow: 0 0 12px var(--success-glow);
      animation: breathe 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.1); }
    }
    @keyframes breathe {
      0%, 100% { box-shadow: 0 0 12px var(--success-glow); }
      50% { box-shadow: 0 0 20px var(--success-glow), 0 0 30px rgba(16, 185, 129, 0.2); }
    }

    .status-content { flex: 1; min-width: 0; }
    .status-label { font-size: 15px; font-weight: 600; }
    .status-sublabel { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ── Streaming URL ───────────────────── */
    .tab-url {
      margin-top: 12px; padding: 12px 16px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      font-size: 11px; color: var(--text-muted);
      word-break: break-all; line-height: 1.5;
      border: 1px solid var(--border);
    }
    .tab-url:empty { display: none; }
    .tab-url::before {
      content: 'Streaming';
      display: block; font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--accent); margin-bottom: 4px;
    }

    .icon { width: 18px; height: 18px; opacity: 0.9; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <div class="header-title-row">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M3 9h18"/>
            <path d="M9 21V9"/>
          </svg>
        </div>
        <h1>Browser Agent</h1>
      </div>
      <button id="closePopupBtn" class="icon-btn" title="Close Popup">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <p>Connect to any WebSocket server for browser automation</p>
  </div>

  <div class="content">
    <div class="form-group">
      <label for="serverUrl">Server URL</label>
      <input type="text" id="serverUrl" placeholder="ws://localhost:3001" value="ws://localhost:3001">
    </div>
    <div class="form-group">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="Optional • sent as ?key=...">
    </div>

    <div class="btn-row">
      <button id="connectBtn" class="primary">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Connect
      </button>
      <button id="disconnectBtn" class="secondary">Disconnect</button>
    </div>

    <div class="status-card" id="statusCard">
      <span class="status-indicator disconnected" id="statusDot"></span>
      <div class="status-content">
        <div class="status-label" id="statusText">Disconnected</div>
        <div class="status-sublabel" id="statusSubtext">Enter URL and connect to start</div>
      </div>
    </div>

    <div class="tab-url" id="tabUrl"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>

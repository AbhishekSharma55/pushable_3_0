services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-abhishek0003}
      POSTGRES_DB: ${POSTGRES_DB:-pushable_ai}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:abhishek0003@postgres:5432/pushable_ai}
      JWT_SECRET: ${JWT_SECRET:-pushable-ai-super-secret-jwt-key-32chars}
      PORT: "4000"
      OPENROUTER_KEY: ${OPENROUTER_KEY}
      REDIS_URL: redis://redis:6379
      COMPOSIO_API_KEY: ${COMPOSIO_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      BROWSER_SERVICE_URL: http://browser-service:8080
      BRIDGE_API_KEY: ""
      EXTENSION_BRIDGE_URL: ws://extension-bridge:3001
      BW_DEVICE_ID: "b661b739-3e2c-4517-9ec0-63cb10842b84"
      BW_DATA_ROOT: /data/bw-sessions
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_CLI_PROXY_URL: ${CLAUDE_CLI_PROXY_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - bw-data:/data/bw-sessions

  browser-service:
    build:
      context: .
      dockerfile: browser-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      PROFILES_DIR: /app/profiles
      ALLOWED_ORIGINS: ${FRONTEND_URL:-http://localhost:3000}
      SCREENSHOT_INTERVAL_MS: "200"
      SCREENSHOT_QUALITY: "60"
      SCREENSHOT_WIDTH: "1920"
      SCREENSHOT_HEIGHT: "1080"
      CAPSOLVER_API_KEY: ${CAPSOLVER_API_KEY}
      CAPSOLVER_EXTENSION_ENABLED: "true"
    volumes:
      - ./browser-service/profiles:/app/profiles
      - ./browser-service/src:/app/src
      - ./browser-service/extensions:/app/extensions

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_BROWSER_WS_URL: ${NEXT_PUBLIC_BROWSER_WS_URL:-ws://localhost:8080}
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

  extension-bridge:
    build: ./extension-bridge
    restart: unless-stopped
    ports:
      - "3004:3001"
    environment:
      BRIDGE_PORT: "3001"
      BRIDGE_API_KEY: ""
    volumes:
      - ./extension-bridge/src:/app/src

  public-frontend:
    build: ./public-frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      API_URL: http://backend:4000
    depends_on:
      - backend
    volumes:
      - ./public-frontend/src:/app/src
      - ./public-frontend/next.config.ts:/app/next.config.ts

  admin-panel:
    build: ./admin-panel
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:abhishek0003@postgres:5432/pushable_ai}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./admin-panel/src:/app/src
      - //var/run/docker.sock:/var/run/docker.sock

volumes:
  pgdata:
  redisdata:
  bw-data:


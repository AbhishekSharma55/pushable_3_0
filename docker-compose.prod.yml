services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-abhishek0003}
      POSTGRES_DB: ${POSTGRES_DB:-pushable_ai}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - '${BACKEND_PORT:-4000}:4000'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-abhishek0003}@postgres:5432/${POSTGRES_DB:-pushable_ai}
      JWT_SECRET: ${JWT_SECRET:-pushable-ai-super-secret-jwt-key-32chars}
      PORT: '4000'
      OPENROUTER_KEY: ${OPENROUTER_KEY}
      REDIS_URL: redis://redis:6379
      COMPOSIO_API_KEY: ${COMPOSIO_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-https://platform.pushable.ai}
      BROWSER_SERVICE_URL: http://browser-service:8080
      EXTENSION_BRIDGE_PUBLIC_URL: ${EXTENSION_BRIDGE_PUBLIC_URL:-wss://ws.pushable.ai}
      EXTENSION_BRIDGE_URL: ws://extension-bridge:3001
      EXTENSION_DIR: /app/extension-v4
      BRIDGE_API_KEY: ${BRIDGE_API_KEY:-}
      BW_DEVICE_ID: ${BW_DEVICE_ID:-}
      BW_DATA_ROOT: /data/bw-sessions
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_CLI_PROXY_URL: ${CLAUDE_CLI_PROXY_URL:-}
      NODE_ENV: production
      CDP_ANALYZER_URL: ${CDP_ANALYZER_URL:-http://cdp-analyzer:5050}
      DEFAULT_BROWSER_AGENT_MODEL: ${DEFAULT_BROWSER_AGENT_MODEL:-google/gemini-2.5-flash}
      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # SMTP (Email)
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Telegram Platform Bot (shared bot for all workspaces)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      # Slack Platform Bot
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID:-}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      BASE_URL: ${BASE_URL:-}
      # WhatsApp Business API
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-pushable_whatsapp_verify}
      # MinIO / S3 bucket storage
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-pushable-bucket}
      S3_REGION: ${S3_REGION:-us-east-1}
    volumes:
      - ./extension-v4:/app/extension-v4:ro
      - bw-data:/data/bw-sessions
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  browser-service:
    build:
      context: .
      dockerfile: browser-service/Dockerfile.prod
    restart: unless-stopped
    ports:
      - '${BROWSER_SERVICE_PORT:-8080}:8080'
    environment:
      PORT: '8080'
      PROFILES_DIR: /app/profiles
      ALLOWED_ORIGINS: ${FRONTEND_URL:-https://platform.pushable.ai},https://pushable.ai
      SCREENSHOT_INTERVAL_MS: '200'
      SCREENSHOT_QUALITY: '60'
      SCREENSHOT_WIDTH: '1920'
      SCREENSHOT_HEIGHT: '1080'
      CAPSOLVER_API_KEY: ${CAPSOLVER_API_KEY:-CAP-EE4E7B31B78FB28FB7488B481872E8EF41ED238F170D21EF8420588FFEC5D2F5}
      CAPSOLVER_EXTENSION_ENABLED: ${CAPSOLVER_EXTENSION_ENABLED:-true}
      BROWSER_PUBLIC_URL: ${BROWSER_PUBLIC_URL:-wss://browser.pushable.ai}
    volumes:
      - browser_profiles:/app/profiles
      - browser_extensions:/app/extensions

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.pushable.ai}
        NEXT_PUBLIC_BROWSER_WS_URL: ${NEXT_PUBLIC_BROWSER_WS_URL:-wss://browser.pushable.ai}
        NEXT_PUBLIC_LOGGING: ${NEXT_PUBLIC_LOGGING:-false}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_LOGGING: ${NEXT_PUBLIC_LOGGING:-false}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    depends_on:
      - backend

  public-frontend:
    build:
      context: ./public-frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.pushable.ai}
        NEXT_PUBLIC_FRONTEND_URL: ${NEXT_PUBLIC_FRONTEND_URL:-https://platform.pushable.ai}
    restart: unless-stopped
    ports:
      - '${PUBLIC_FRONTEND_PORT:-3001}:3001'
    environment:
      NODE_ENV: production
      API_URL: http://backend:4000
    depends_on:
      - backend

  extension-bridge:
    build:
      context: ./extension-bridge
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '${EXTENSION_BRIDGE_PORT:-3004}:3001'
    environment:
      BRIDGE_PORT: '3001'
      BACKEND_URL: http://backend:4000
      BRIDGE_API_KEY: ${BRIDGE_API_KEY:-}
      EXTENSION_BRIDGE_PUBLIC_URL: ${EXTENSION_BRIDGE_PUBLIC_URL:-wss://ws.pushable.ai}
    depends_on:
      - backend

  cdp-analyzer:
    build: ./cdp-analyzer
    restart: unless-stopped

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.pushable.ai}
    restart: unless-stopped
    ports:
      - '${ADMIN_PANEL_PORT:-3002}:3002'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-abhishek0003}@postgres:5432/${POSTGRES_DB:-pushable_ai}
      AUTH_SECRET: ${AUTH_SECRET:-pushable-admin-secret-key-change-in-prod}
      ADMIN_COOKIE_SECURE: ${ADMIN_COOKIE_SECURE:-true}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  bw-data:
  minio-data:
  browser_profiles:
  browser_extensions:

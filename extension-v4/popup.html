<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root { --bg:#0a0a0f; --bg2:#12121a; --border:#2a2a38; --text:#f0f0f5; --muted:#55556a; --accent:#6366f1; --glow:rgba(99,102,241,0.15); --ok:#34d399; --ok-bg:rgba(52,211,153,0.08); --err:#f87171; --err-bg:rgba(248,113,113,0.08); --r:10px; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif; background:var(--bg); color:var(--text); width:300px; padding:20px; }
    .brand { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
    .brand-icon { width:30px; height:30px; border-radius:8px; background:linear-gradient(135deg,var(--accent),#a855f7); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:white; }
    .brand-name { font-size:14px; font-weight:700; background:linear-gradient(135deg,var(--accent),#a855f7); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
    .brand-ver { font-size:9px; color:#9999b0; letter-spacing:1px; text-transform:uppercase; }
    .label { font-size:10px; font-weight:600; color:#b0b0c8; letter-spacing:0.5px; text-transform:uppercase; margin-bottom:5px; display:block; }
    .input-wrap { position:relative; margin-bottom:14px; }
    .input-wrap .ico { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:13px; pointer-events:none; }
    input[type="password"] { width:100%; padding:9px 10px 9px 32px; border:1px solid var(--border); border-radius:var(--r); background:var(--bg2); color:var(--text); font-size:12px; font-family:'SF Mono','Fira Code',monospace; outline:none; }
    input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--glow); }
    .btns { display:flex; gap:8px; }
    .btn { flex:1; padding:9px 0; border:none; border-radius:var(--r); font-weight:600; font-size:12px; cursor:pointer; }
    .btn-c { background:linear-gradient(135deg,var(--accent),#7c3aed); color:white; }
    .btn-d { background:var(--bg2); color:#8888a0; border:1px solid var(--border); }
    .btn:disabled { opacity:0.3; cursor:not-allowed; }
    .status { margin-top:14px; padding:10px 12px; border-radius:var(--r); background:var(--bg2); border:1px solid var(--border); display:flex; align-items:center; gap:10px; }
    .status.connected { border-color:rgba(52,211,153,0.3); background:var(--ok-bg); }
    .status.error { border-color:rgba(248,113,113,0.3); background:var(--err-bg); }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--muted); }
    .dot.connected { background:var(--ok); animation:pulse 2s infinite; }
    .dot.connecting { background:#fbbf24; animation:blink 1s infinite; }
    .dot.error { background:var(--err); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .s-text { font-size:12px; font-weight:600; }
    .badge { display:inline-block; margin-top:8px; padding:3px 8px; border-radius:6px; font-size:9px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; background:rgba(52,211,153,0.12); color:#6ee7b7; border:1px solid rgba(52,211,153,0.2); }
    .err { margin-top:8px; padding:8px 10px; border-radius:var(--r); background:var(--err-bg); border:1px solid rgba(248,113,113,0.15); font-size:11px; color:#ff8888; }
    .err:empty { display:none; }
  </style>
</head>
<body>
  <div class="brand">
    <div class="brand-icon">P</div>
    <div>
      <div class="brand-name">Pushable AI</div>
      <div class="brand-ver">v6 Python CDP Analyzer</div>
    </div>
  </div>
  <input type="hidden" id="serverUrl" value="ws://localhost:3004">
   <!-- <input type="hidden" id="serverUrl" value="wss://ws.pushable.ai"> -->
  <label class="label" for="apiKey">API Key</label>
  <div class="input-wrap">
    <span class="ico">&#128273;</span>
    <input type="password" id="apiKey" placeholder="Paste your workspace API key">
  </div>
  <div class="btns">
    <button class="btn btn-c" id="connectBtn">Connect</button>
    <button class="btn btn-d" id="disconnectBtn" disabled>Disconnect</button>
  </div>
  <div class="status" id="statusCard">
    <span class="dot" id="statusDot"></span>
    <span class="s-text" id="statusText">Disconnected</span>
  </div>
  <div class="badge">Python CDP + DOMSnapshot</div>
  <div class="err" id="errorMsg"></div>
  <script src="popup.js"></script>
</body>
</html>

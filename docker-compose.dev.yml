services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: abhishek0003
      POSTGRES_DB: pushable_ai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:abhishek0003@postgres:5432/pushable_ai
      JWT_SECRET: pushable-ai-super-secret-jwt-key-32chars
      PORT: "4000"
      OPENROUTER_KEY: ${OPENROUTER_KEY:-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}
      REDIS_URL: redis://redis:6379
      COMPOSIO_API_KEY: ${COMPOSIO_API_KEY:-ak_sYMIgmVF81jyVXtDGmWQ}
      FRONTEND_URL: http://localhost:3000
      BROWSER_SERVICE_URL: http://browser-service:8080
      BRIDGE_API_KEY: ""
      EXTENSION_BRIDGE_URL: ws://extension-bridge:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src

  browser-service:
    build:
      context: .
      dockerfile: browser-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      PROFILES_DIR: /app/profiles
      ALLOWED_ORIGINS: http://localhost:3000
      SCREENSHOT_INTERVAL_MS: "200"
      SCREENSHOT_QUALITY: "60"
      SCREENSHOT_WIDTH: "1920"
      SCREENSHOT_HEIGHT: "1080"
      CAPSOLVER_API_KEY: ${CAPSOLVER_API_KEY:-CAP-EE4E7B31B78FB28FB7488B481872E8EF41ED238F170D21EF8420588FFEC5D2F5}
      CAPSOLVER_EXTENSION_ENABLED: "true"
    volumes:
      - ./browser-service/profiles:/app/profiles
      - ./browser-service/src:/app/src
      - ./browser-service/extensions:/app/extensions

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_BROWSER_WS_URL: ws://localhost:8080
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

  extension-bridge:
    build: ./extension-bridge
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      BRIDGE_PORT: "3001"
      BRIDGE_API_KEY: ""
    volumes:
      - ./extension-bridge/src:/app/src

volumes:
  pgdata:
  redisdata:


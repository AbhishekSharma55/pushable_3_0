<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-tertiary: #1a1a25;
      --border: #2a2a38;
      --text-primary: #f0f0f5;
      --text-secondary: #8888a0;
      --text-muted: #55556a;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --accent-glow: rgba(99, 102, 241, 0.15);
      --success: #34d399;
      --success-bg: rgba(52, 211, 153, 0.1);
      --warning: #fbbf24;
      --error: #f87171;
      --error-bg: rgba(248, 113, 113, 0.1);
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
    }

    .brand-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-version {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── Input ── */
    .input-group {
      position: relative;
    }

    .input-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: block;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 12px;
      color: var(--text-muted);
      font-size: 14px;
      pointer-events: none;
    }

    input[type="password"] {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    input::placeholder { color: var(--text-muted); font-family: inherit; }

    /* ── Buttons ── */
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    .btn {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    .btn-connect {
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: white;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
    }
    .btn-connect:hover:not(:disabled) {
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
      transform: translateY(-1px);
    }

    .btn-disconnect {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-disconnect:hover:not(:disabled) {
      background: var(--border);
      color: var(--text-primary);
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    /* ── Status ── */
    .status-section {
      padding: 16px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .status-card {
      padding: 14px 16px;
      border-radius: var(--radius);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.3s, background 0.3s;
    }

    .status-card.connected {
      border-color: rgba(52, 211, 153, 0.3);
      background: var(--success-bg);
    }

    .status-card.error {
      border-color: rgba(248, 113, 113, 0.3);
      background: var(--error-bg);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
      position: relative;
    }

    .dot.connected {
      background: var(--success);
      box-shadow: 0 0 8px rgba(52, 211, 153, 0.5);
    }
    .dot.connected::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 2px solid var(--success);
      opacity: 0;
      animation: ring 2s ease-out infinite;
    }

    .dot.connecting {
      background: var(--warning);
      animation: blink 1s infinite;
    }

    .dot.error { background: var(--error); }

    @keyframes ring {
      0% { opacity: 0.6; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.8); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .status-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .status-label {
      font-size: 13px;
      font-weight: 600;
    }

    .status-detail {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── Info cards ── */
    .info-card {
      padding: 12px 16px;
      border-radius: var(--radius);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }

    .info-row + .info-row { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }

    .info-key { color: var(--text-secondary); }

    .info-value {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .info-value.tabs { color: var(--accent); }

    /* ── Error ── */
    .error-msg {
      font-size: 12px;
      color: var(--error);
      padding: 10px 16px;
      border-radius: var(--radius);
      background: var(--error-bg);
      border: 1px solid rgba(248, 113, 113, 0.2);
      display: none;
    }
    .error-msg.visible { display: block; }

    /* ── Footer ── */
    .footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 10px;
      color: var(--text-muted);
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="header">
    <div class="brand">
      <div class="brand-icon">P</div>
      <div class="brand-text">
        <span class="brand-name">Pushable AI</span>
        <span class="brand-version">Browser Agent v3.1</span>
      </div>
    </div>

    <input type="hidden" id="serverUrl" value="wss://ws.pushable.ai">

    <div class="input-group">
      <label class="input-label" for="apiKey">API Key</label>
      <div class="input-wrapper">
        <span class="input-icon">&#128273;</span>
        <input type="password" id="apiKey" placeholder="Paste your workspace API key">
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-connect" id="connectBtn">Connect</button>
      <button class="btn btn-disconnect" id="disconnectBtn" disabled>Disconnect</button>
    </div>
  </div>

  <div class="status-section">
    <div class="status-card" id="statusCard">
      <span class="dot" id="statusDot"></span>
      <div class="status-info">
        <span class="status-label" id="statusText">Disconnected</span>
        <span class="status-detail" id="statusDetail">Click Connect to start</span>
      </div>
    </div>

    <div class="info-card" id="infoCard" style="display:none">
      <div class="info-row">
        <span class="info-key">Active Tabs</span>
        <span class="info-value tabs" id="tabCount">0</span>
      </div>
      <div class="info-row">
        <span class="info-key">Server</span>
        <span class="info-value" id="serverDisplay">ws.pushable.ai</span>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="footer">
    Powered by <a href="https://pushable.ai" target="_blank">pushable.ai</a>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
